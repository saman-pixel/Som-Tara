```html
<!DOCTYPE html>
<html>
<head>
<title>Star Map Generator</title>
<style>
body{
  font-family: Arial;
  text-align:center;
  margin-top:40px;
}
input,button{
  padding:10px;
  margin:8px;
}
img{
  margin-top:20px;
  max-width:600px;
}
</style>
</head>

<body>

<h2>Create Your Star Map</h2>

<input type="text" id="location" placeholder="Enter location (e.g. Kathmandu)">
<br>

<input type="date" id="date">
<br>

<button onclick="generateMap()">Generate Star Map</button>
<button onclick="downloadMap()">Download</button>

<br><br>

<img id="starmap"/>

<script>

let imageUrl = "";

async function generateMap(){

  const location = document.getElementById("location").value;
  const date = document.getElementById("date").value;

  if(!location || !date){
    alert("Please enter location and date");
    return;
  }

  /* Convert location → latitude & longitude */
  const geo = await fetch(
    `https://nominatim.openstreetmap.org/search?q=${location}&format=json&limit=1`
  );

  const geoData = await geo.json();

  if(!geoData.length){
    alert("Location not found");
    return;
  }

  const lat = geoData[0].lat;
  const lon = geoData[0].lon;

  const time = "21:00:00";

  imageUrl = `/api/starmap.svg?api_key=YOUR_API_KEY
  &latitude=${lat}
  &longitude=${lon}
  &date=${date}
  &time=${time}
  &background_color=000000
  &main_color=FFFFFF
  &show_milky_way=true
  &show_constellations=true`.replace(/\s/g,'');

  document.getElementById("starmap").src = imageUrl;
}

function downloadMap(){
  if(!imageUrl){
    alert("Generate map first");
    return;
  }

  const link = document.createElement("a");
  link.href = imageUrl;
  link.download = "starmap.svg";
  link.click();
}

</script>

</body>
</html>
```
