<!DOCTYPE html>
<html>
<head>
  <title>Star Map Generator</title>
</head>
<body>

<h2>Create Your Star Map</h2>

<label>Place:</label>
<input type="text" id="place" placeholder="Kathmandu"><br><br>

<label>Latitude:</label>
<input type="text" id="lat" placeholder="27.7172"><br><br>

<label>Longitude:</label>
<input type="text" id="lng" placeholder="85.3240"><br><br>

<label>Date:</label>
<input type="date" id="date"><br><br>

<label>Time:</label>
<input type="time" id="time"><br><br>

<button onclick="generateStarMap()">Generate</button>
<button onclick="downloadImage()">Download</button>

<br><br>

<img id="starmap" width="500">

<script>

let imageUrl = "";

function generateStarMap(){

const lat = document.getElementById("lat").value;
const lng = document.getElementById("lng").value;
const date = document.getElementById("date").value;
const time = document.getElementById("time").value;

imageUrl = `/api/starmap.svg?api_key=YOUR_API_KEY
&latitude=${lat}
&longitude=${lng}
&date=${date}
&time=${time}
&background_color=000000
&main_color=FFFFFF
&show_milky_way=true
&show_constellations=true`;

imageUrl = imageUrl.replace(/\s/g,'');

document.getElementById("starmap").src = imageUrl;

}

function downloadImage(){

const link = document.createElement("a");
link.href = imageUrl;
link.download = "starmap.svg";
link.click();

}

</script>

</body>
</html>
