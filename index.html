<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Star Map Poster Generator</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Jost:wght@200;300;400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --ink: #1a1a1a;
    --cream: #f5f2ec;
    --gold: #b8965a;
    --gold-light: #d4b078;
    --rose: #c4848a;
    --muted: #7a7570;
    --border: #d6cfc4;
    --white: #ffffff;
  }

  body {
    font-family: 'Jost', sans-serif;
    background: var(--cream);
    color: var(--ink);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* ── HEADER ── */
  header {
    text-align: center;
    padding: 3rem 2rem 2rem;
    border-bottom: 1px solid var(--border);
    background: var(--white);
  }

  header .eyebrow {
    font-family: 'Jost', sans-serif;
    font-weight: 200;
    font-size: 0.7rem;
    letter-spacing: 0.35em;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 0.75rem;
  }

  header h1 {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 300;
    font-size: clamp(2rem, 5vw, 3.2rem);
    letter-spacing: 0.04em;
    color: var(--ink);
    line-height: 1.1;
  }

  header h1 em {
    font-style: italic;
    color: var(--rose);
  }

  header p {
    margin-top: 0.75rem;
    font-size: 0.82rem;
    font-weight: 300;
    color: var(--muted);
    letter-spacing: 0.05em;
  }

  /* ── LAYOUT ── */
  .app {
    display: grid;
    grid-template-columns: 380px 1fr;
    gap: 0;
    flex: 1;
    max-width: 1400px;
    margin: 0 auto;
    width: 100%;
  }

  /* ── SIDEBAR ── */
  .sidebar {
    background: var(--white);
    border-right: 1px solid var(--border);
    padding: 2.5rem 2rem;
    overflow-y: auto;
  }

  .section-label {
    font-size: 0.65rem;
    font-weight: 400;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 1.25rem;
    display: flex;
    align-items: center;
    gap: 0.75rem;
  }

  .section-label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  .field {
    margin-bottom: 1.5rem;
  }

  label {
    display: block;
    font-size: 0.72rem;
    font-weight: 400;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 0.45rem;
  }

  input[type="text"],
  input[type="date"],
  input[type="number"],
  select,
  textarea {
    width: 100%;
    padding: 0.65rem 0.9rem;
    border: 1px solid var(--border);
    border-radius: 2px;
    font-family: 'Jost', sans-serif;
    font-size: 0.88rem;
    font-weight: 300;
    color: var(--ink);
    background: var(--cream);
    transition: border-color 0.2s, background 0.2s;
    outline: none;
    appearance: none;
  }

  input:focus, select:focus, textarea:focus {
    border-color: var(--gold);
    background: var(--white);
  }

  textarea {
    resize: vertical;
    min-height: 64px;
  }

  .row-2 {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0.75rem;
  }

  .hint {
    font-size: 0.68rem;
    color: var(--muted);
    margin-top: 0.35rem;
    font-weight: 300;
  }

  /* color palette */
  .palette {
    display: flex;
    gap: 0.5rem;
    flex-wrap: wrap;
  }

  .swatch {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    cursor: pointer;
    border: 2px solid transparent;
    transition: transform 0.15s, border-color 0.15s;
    position: relative;
  }

  .swatch:hover { transform: scale(1.12); }
  .swatch.active { border-color: var(--gold); }

  /* size selector */
  .size-options {
    display: flex;
    gap: 0.5rem;
  }

  .size-btn {
    flex: 1;
    padding: 0.55rem 0.5rem;
    border: 1px solid var(--border);
    background: var(--cream);
    border-radius: 2px;
    font-family: 'Jost', sans-serif;
    font-size: 0.78rem;
    font-weight: 300;
    color: var(--ink);
    cursor: pointer;
    text-align: center;
    transition: all 0.15s;
    letter-spacing: 0.05em;
  }

  .size-btn:hover { border-color: var(--gold); }
  .size-btn.active { background: var(--ink); color: var(--white); border-color: var(--ink); }

  /* divider */
  .divider {
    height: 1px;
    background: var(--border);
    margin: 2rem 0;
  }

  /* buttons */
  .btn-generate {
    width: 100%;
    padding: 0.9rem;
    background: var(--ink);
    color: var(--white);
    border: none;
    border-radius: 2px;
    font-family: 'Jost', sans-serif;
    font-size: 0.8rem;
    font-weight: 300;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    cursor: pointer;
    transition: background 0.2s;
    margin-bottom: 0.75rem;
  }

  .btn-generate:hover { background: var(--gold); }

  .btn-print {
    width: 100%;
    padding: 0.75rem;
    background: transparent;
    color: var(--ink);
    border: 1px solid var(--border);
    border-radius: 2px;
    font-family: 'Jost', sans-serif;
    font-size: 0.78rem;
    font-weight: 300;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.2s;
  }

  .btn-print:hover { border-color: var(--ink); }

  /* ── PREVIEW ── */
  .preview-area {
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 3rem;
    background: #e8e5de;
    background-image:
      radial-gradient(circle at 20% 80%, rgba(180,150,90,0.06) 0%, transparent 50%),
      radial-gradient(circle at 80% 20%, rgba(196,132,138,0.06) 0%, transparent 50%);
    position: relative;
    overflow: auto;
  }

  /* ── POSTER ── */
  .poster-wrap {
    position: relative;
    display: inline-block;
  }

  .poster {
    background: var(--white);
    border: 2px solid var(--ink);
    text-align: center;
    font-family: 'Cormorant Garamond', serif;
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: space-between;
    transition: all 0.3s;
    box-shadow: 8px 8px 40px rgba(0,0,0,0.18);
  }

  /* size variants — these scale the visual preview */
  .poster[data-size="4x6"]  { width: 280px; height: 420px; padding: 28px 28px 24px; }
  .poster[data-size="5x7"]  { width: 320px; height: 448px; padding: 30px 30px 26px; }
  .poster[data-size="8x10"] { width: 380px; height: 475px; padding: 36px 36px 30px; }
  .poster[data-size="12x16"]{ width: 420px; height: 560px; padding: 42px 42px 36px; }

  .poster-inner {
    width: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    height: 100%;
    justify-content: space-between;
  }

  .poster-header {
    width: 100%;
  }

  .poster-pretitle {
    font-family: 'Jost', sans-serif;
    font-weight: 200;
    letter-spacing: 0.28em;
    text-transform: uppercase;
    font-size: 0.55rem;
    color: var(--gold);
    margin-bottom: 0.3rem;
  }

  /* starmap circle */
  .starmap-ring {
    position: relative;
    border-radius: 50%;
    overflow: hidden;
    flex-shrink: 0;
    margin: auto;
  }

  .poster[data-size="4x6"]  .starmap-ring { width: 190px; height: 190px; }
  .poster[data-size="5x7"]  .starmap-ring { width: 220px; height: 220px; }
  .poster[data-size="8x10"] .starmap-ring { width: 260px; height: 260px; }
  .poster[data-size="12x16"].starmap-ring { width: 290px; height: 290px; }

  .starmap-ring img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  .starmap-ring::after {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: 50%;
    border: 2px solid rgba(255,255,255,0.12);
    pointer-events: none;
  }

  /* poster text */
  .poster-body {
    width: 100%;
    text-align: center;
  }

  .poster-title {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 600;
    line-height: 1.2;
    letter-spacing: 0.06em;
    margin-bottom: 0.15rem;
  }

  .poster[data-size="4x6"]  .poster-title { font-size: 0.92rem; }
  .poster[data-size="5x7"]  .poster-title { font-size: 1rem; }
  .poster[data-size="8x10"] .poster-title { font-size: 1.1rem; }
  .poster[data-size="12x16"].poster-title { font-size: 1.25rem; }

  .poster-location {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 300;
    letter-spacing: 0.12em;
    text-transform: uppercase;
  }

  .poster[data-size="4x6"]  .poster-location { font-size: 0.8rem; }
  .poster[data-size="5x7"]  .poster-location { font-size: 0.9rem; }
  .poster[data-size="8x10"] .poster-location { font-size: 1rem; }
  .poster[data-size="12x16"].poster-location { font-size: 1.15rem; }

  .poster-meta {
    font-family: 'Jost', sans-serif;
    font-weight: 200;
    letter-spacing: 0.15em;
    color: var(--muted);
    margin-top: 0.2rem;
  }

  .poster[data-size="4x6"]  .poster-meta { font-size: 0.58rem; }
  .poster[data-size="5x7"]  .poster-meta { font-size: 0.63rem; }
  .poster[data-size="8x10"] .poster-meta { font-size: 0.68rem; }
  .poster[data-size="12x16"].poster-meta { font-size: 0.75rem; }

  .poster-rule {
    width: 40px;
    height: 1px;
    background: currentColor;
    margin: 0.4rem auto;
    opacity: 0.25;
  }

  /* ── POSTER COLOR THEMES ── */
  .poster[data-theme="dark"] {
    background: #0f0f14;
    border-color: #0f0f14;
    color: #e8e5de;
  }
  .poster[data-theme="dark"] .poster-pretitle { color: #b8965a; }
  .poster[data-theme="dark"] .poster-meta { color: #7a7570; }

  .poster[data-theme="ivory"] {
    background: #faf8f3;
    border-color: #2a2520;
    color: #2a2520;
  }

  .poster[data-theme="rose"] {
    background: #fff8f8;
    border-color: #8b4a50;
    color: #5c2d32;
  }
  .poster[data-theme="rose"] .poster-pretitle { color: #c4848a; }
  .poster[data-theme="rose"] .starmap-ring::after { border-color: rgba(196,132,138,0.3); }

  .poster[data-theme="sage"] {
    background: #f4f6f3;
    border-color: #3d4a3a;
    color: #2a3428;
  }
  .poster[data-theme="sage"] .poster-pretitle { color: #7a9470; }

  .poster[data-theme="navy"] {
    background: #0d1628;
    border-color: #0d1628;
    color: #dce5f0;
  }
  .poster[data-theme="navy"] .poster-pretitle { color: #8aaccc; }
  .poster[data-theme="navy"] .poster-meta { color: #6a849e; }

  /* loading state on map */
  .map-loading {
    position: absolute;
    inset: 0;
    border-radius: 50%;
    background: #111;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .spinner {
    width: 24px;
    height: 24px;
    border: 2px solid rgba(255,255,255,0.15);
    border-top-color: rgba(255,255,255,0.6);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  /* geocode status */
  .geo-status {
    font-size: 0.7rem;
    margin-top: 0.3rem;
    font-weight: 300;
    min-height: 1rem;
    transition: color 0.2s;
  }

  .geo-status.ok { color: #7a9470; }
  .geo-status.err { color: var(--rose); }
  .geo-status.loading { color: var(--gold); }

  /* responsive */
  @media (max-width: 860px) {
    .app { grid-template-columns: 1fr; }
    .preview-area { padding: 2rem 1rem; order: -1; min-height: 520px; }
    .sidebar { border-right: none; border-top: 1px solid var(--border); }
  }

  @media print {
    body, html { background: white; }
    .sidebar, header, .btn-generate, .btn-print { display: none !important; }
    .preview-area { background: white; padding: 0; display: block; }
    .poster { box-shadow: none; margin: 0 auto; }
  }
</style>
</head>
<body>

<header>
  <div class="eyebrow">✦ Personalized Keepsake</div>
  <h1>Star Map <em>Poster</em> Generator</h1>
  <p>Capture the exact sky on your special night — wherever you were in the world.</p>
</header>

<div class="app">

  <!-- ── SIDEBAR ── -->
  <aside class="sidebar">

    <div class="section-label">Your Moment</div>

    <div class="field">
      <label>Location Name</label>
      <input type="text" id="locationName" placeholder="e.g. Hariwan, Nepal" value="Hariwan">
    </div>

    <div class="field">
      <label>City / Address <span style="font-size:0.65rem;opacity:.6">(for geocoding)</span></label>
      <input type="text" id="cityInput" placeholder="Search a city…" value="Hariwan, Nepal">
      <div class="geo-status" id="geoStatus"></div>
    </div>

    <div class="row-2">
      <div class="field">
        <label>Latitude</label>
        <input type="number" id="lat" step="0.0001" value="27.1383">
      </div>
      <div class="field">
        <label>Longitude</label>
        <input type="number" id="lng" step="0.0001" value="85.5342">
      </div>
    </div>

    <div class="field">
      <label>Date</label>
      <input type="date" id="dateInput" value="2004-03-13">
    </div>

    <div class="divider"></div>
    <div class="section-label">Your Message</div>

    <div class="field">
      <label>Title / Headline</label>
      <input type="text" id="titleInput" placeholder="e.g. I AM JUST A GIRL 🎀" value="I AM JUST A GIRL 🎀">
    </div>

    <div class="field">
      <label>Subtitle <span style="font-size:0.65rem;opacity:.6">(optional)</span></label>
      <input type="text" id="subtitleInput" placeholder="e.g. The night the stars aligned" value="">
    </div>

    <div class="divider"></div>
    <div class="section-label">Style</div>

    <div class="field">
      <label>Frame Size</label>
      <div class="size-options">
        <button class="size-btn" data-size="4x6">4×6"</button>
        <button class="size-btn" data-size="5x7">5×7"</button>
        <button class="size-btn active" data-size="8x10">8×10"</button>
        <button class="size-btn" data-size="12x16">12×16"</button>
      </div>
    </div>

    <div class="field">
      <label>Color Theme</label>
      <div class="palette">
        <div class="swatch active" data-theme="dark"     style="background:#0f0f14;border:2px solid #444" title="Midnight"></div>
        <div class="swatch"        data-theme="ivory"    style="background:#faf8f3;border:2px solid #c8c0b0" title="Ivory"></div>
        <div class="swatch"        data-theme="rose"     style="background:#fff0f0;border:2px solid #c4848a" title="Rose"></div>
        <div class="swatch"        data-theme="sage"     style="background:#f4f6f3;border:2px solid #7a9470" title="Sage"></div>
        <div class="swatch"        data-theme="navy"     style="background:#0d1628;border:2px solid #3a5a7a" title="Navy"></div>
      </div>
    </div>

    <div class="divider"></div>

    <button class="btn-generate" id="generateBtn">Generate Star Map</button>
    <button class="btn-print" onclick="window.print()">⬇ Print / Save as PDF</button>

  </aside>

  <!-- ── PREVIEW ── -->
  <main class="preview-area">
    <div class="poster-wrap">
      <div class="poster" id="poster" data-size="8x10" data-theme="dark">
        <div class="poster-inner">

          <div class="poster-header">
            <div class="poster-pretitle" id="previewSubtitle"></div>
          </div>

          <div class="starmap-ring" id="starmapRing">
            <div class="map-loading" id="mapLoading">
              <div class="spinner"></div>
            </div>
            <img id="starmapImg" style="display:none" alt="Star Map" onload="mapLoaded()" onerror="mapError()">
          </div>

          <div class="poster-body">
            <div class="poster-rule"></div>
            <div class="poster-title"  id="previewTitle">I AM JUST A GIRL 🎀</div>
            <div class="poster-location" id="previewLocation">HARIWAN</div>
            <div class="poster-meta"     id="previewMeta">27°08′N · 85°32′E · 13 · 03 · 2004</div>
            <div class="poster-rule"></div>
          </div>

        </div>
      </div>
    </div>
  </main>

</div>

<script>
// ── state ──
let state = {
  lat: 27.1383,
  lng: 85.5342,
  date: '2004-03-13',
  location: 'Hariwan',
  title: 'I AM JUST A GIRL 🎀',
  subtitle: '',
  size: '8x10',
  theme: 'dark'
};

// ── DOM refs ──
const poster        = document.getElementById('poster');
const starmapImg    = document.getElementById('starmapImg');
const mapLoading    = document.getElementById('mapLoading');
const previewTitle  = document.getElementById('previewTitle');
const previewLocation = document.getElementById('previewLocation');
const previewMeta   = document.getElementById('previewMeta');
const previewSubtitle = document.getElementById('previewSubtitle');
const geoStatus     = document.getElementById('geoStatus');

// ── helpers ──
function formatCoords(lat, lng) {
  const latD = Math.abs(lat).toFixed(4);
  const lngD = Math.abs(lng).toFixed(4);
  const latDir = lat >= 0 ? 'N' : 'S';
  const lngDir = lng >= 0 ? 'E' : 'W';
  return `${latD}°${latDir} · ${lngD}°${lngDir}`;
}

function formatDate(d) {
  if (!d) return '';
  const parts = d.split('-');
  return `${parts[2]} · ${parts[1]} · ${parts[0]}`;
}

function starMapUrl(lat, lng, date) {
  return `https://api.flotiq.com/image/0x0/_media-d33b594e-b23c-41d0-bb48-bb716f523bb7.svg?lat=${lat}&lng=${lng}&date=${date}`;
}

// ── update preview text ──
function updatePreview() {
  previewTitle.textContent    = state.title || 'Your Moment';
  previewLocation.textContent = (state.location || 'Your Location').toUpperCase();
  previewSubtitle.textContent = state.subtitle || '';
  previewMeta.textContent     = `${formatCoords(state.lat, state.lng)} · ${formatDate(state.date)}`;
}

// ── load star map ──
function loadMap() {
  mapLoading.style.display = 'flex';
  starmapImg.style.display = 'none';
  starmapImg.src = '';
  setTimeout(() => {
    starmapImg.src = starMapUrl(state.lat, state.lng, state.date);
  }, 50);
}

function mapLoaded() {
  mapLoading.style.display = 'none';
  starmapImg.style.display = 'block';
}

function mapError() {
  mapLoading.innerHTML = '<span style="color:#888;font-size:0.65rem;letter-spacing:0.08em;font-family:Jost,sans-serif">Map unavailable</span>';
}

// ── geocode ──
let geoTimer;
function geocode(query) {
  clearTimeout(geoTimer);
  if (!query.trim()) return;
  geoStatus.textContent = 'Searching…';
  geoStatus.className = 'geo-status loading';
  geoTimer = setTimeout(async () => {
    try {
      const url = `https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(query)}&format=json&limit=1`;
      const res = await fetch(url, { headers: { 'Accept-Language': 'en' } });
      const data = await res.json();
      if (data.length) {
        const { lat, lon, display_name } = data[0];
        state.lat = parseFloat(parseFloat(lat).toFixed(4));
        state.lng = parseFloat(parseFloat(lon).toFixed(4));
        document.getElementById('lat').value = state.lat;
        document.getElementById('lng').value = state.lng;
        geoStatus.textContent = '✓ Found: ' + display_name.split(',').slice(0,3).join(', ');
        geoStatus.className = 'geo-status ok';
        updatePreview();
      } else {
        geoStatus.textContent = 'Location not found. Enter coordinates manually.';
        geoStatus.className = 'geo-status err';
      }
    } catch(e) {
      geoStatus.textContent = 'Geocoding unavailable — use manual coordinates.';
      geoStatus.className = 'geo-status err';
    }
  }, 700);
}

// ── wire inputs ──
document.getElementById('locationName').addEventListener('input', e => {
  state.location = e.target.value; updatePreview();
});

document.getElementById('cityInput').addEventListener('input', e => {
  geocode(e.target.value);
});

document.getElementById('lat').addEventListener('input', e => {
  state.lat = parseFloat(e.target.value) || 0; updatePreview();
});

document.getElementById('lng').addEventListener('input', e => {
  state.lng = parseFloat(e.target.value) || 0; updatePreview();
});

document.getElementById('dateInput').addEventListener('input', e => {
  state.date = e.target.value; updatePreview();
});

document.getElementById('titleInput').addEventListener('input', e => {
  state.title = e.target.value; updatePreview();
});

document.getElementById('subtitleInput').addEventListener('input', e => {
  state.subtitle = e.target.value; updatePreview();
});

// ── size buttons ──
document.querySelectorAll('.size-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.size-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    state.size = btn.dataset.size;
    poster.dataset.size = state.size;
  });
});

// ── palette swatches ──
document.querySelectorAll('.swatch').forEach(sw => {
  sw.addEventListener('click', () => {
    document.querySelectorAll('.swatch').forEach(s => s.classList.remove('active'));
    sw.classList.add('active');
    state.theme = sw.dataset.theme;
    poster.dataset.theme = state.theme;
  });
});

// ── generate button ──
document.getElementById('generateBtn').addEventListener('click', () => {
  updatePreview();
  loadMap();
});

// ── init ──
updatePreview();
loadMap();
</script>
</body>
</html>
