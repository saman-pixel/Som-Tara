<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Star Map Poster</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Montserrat:wght@300&display=swap" rel="stylesheet">

<style>

body{
    margin:0;
    background:#e8e8e8;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}

/* 8 x 10 inch poster */

.poster{
    width:8in;
    height:10in;
    background:#f6f6f6;
    border:3px solid black;
    text-align:center;
    font-family:"Playfair Display", serif;
    padding-top:0.7in;
    box-sizing:border-box;
}

/* star map circle */

.starmap{
    width:5in;
    height:5in;
    margin:auto;
    border-radius:50%;
    overflow:hidden;
    background:black;
}

.starmap img{
    width:100%;
    height:100%;
    object-fit:cover;
}

/* text styling */

.title{
    margin-top:0.6in;
    font-size:18px;
    letter-spacing:1px;
}

.location{
    margin-top:0.35in;
    font-size:22px;
    letter-spacing:2px;
}

.coords{
    margin-top:0.1in;
    font-family:"Montserrat", sans-serif;
    font-size:14px;
}

.date{
    margin-top:0.1in;
    font-family:"Montserrat", sans-serif;
    font-size:14px;
}

</style>
</head>

<body>

<div class="poster">

    <div class="starmap">
        <img id="starmap-img">
    </div>

    <div class="title">
        I AM JUST A GIRL 🎀
    </div>

    <div class="location">
        HARIWAN
    </div>

    <div class="coords">
        27°08'18" N 85°32'03" E
    </div>

    <div class="date">
        13 • 03 • 2004
    </div>

</div>

<script>

const latitude = 27.1383
const longitude = 85.5342
const date = "2004-03-13"

const apiUrl =
`https://api.flotiq.com/image/0x0/_media-d33b594e-b23c-41d0-bb48-bb716f523bb7.svg?lat=${latitude}&lng=${longitude}&date=${date}`

document.getElementById("starmap-img").src = apiUrl

</script>

</body>
</html>
